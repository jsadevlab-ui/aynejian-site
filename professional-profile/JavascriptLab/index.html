<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button & Popup Example</title>
<style>
    body {
        font-family: Arial, sans-serif;
    }

    /* Button styling */
    .open-btn {
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
    }
    .open-btn:hover {
        background-color: #0056b3;
    }

    /* Popup background overlay */
    .popup-overlay {
        display: none; /* Hidden by default */
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 999;
    }

    /* Popup box */
    .popup-box {
        background: white;
        width: 300px;
        margin: 100px auto;
        padding: 20px;
        border-radius: 8px;
        position: relative;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* Close button */
    .close-btn {
        position: absolute;
        top: 10px; right: 10px;
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>
<body>
This is a simple example of a button that opens a popup.
<br><br>
 Click the button below to see the popup in action.
<br><br><br><br>

<!-- Button to open popup -->
<button class="open-btn" id="openPopupBtn">Open Popup</button>

<!-- Popup structure -->
<div class="popup-overlay" id="popupOverlay" role="dialog" aria-modal="true">
    <div class="popup-box">
        <button class="close-btn" id="closePopupBtn" aria-label="Close popup">&times;</button>
        <h2>Popup Title</h2>
        <p>This is a simple popup message.</p>
    </div>
</div>

<script>
    // Get elements
    const openBtn = document.getElementById('openPopupBtn');
    const closeBtn = document.getElementById('closePopupBtn');
    const overlay = document.getElementById('popupOverlay');

    // Open popup
    openBtn.addEventListener('click', () => {
        overlay.style.display = 'block';
    });

    // Close popup
    closeBtn.addEventListener('click', () => {
        overlay.style.display = 'none';
    });

    // Close when clicking outside the popup box
    overlay.addEventListener('click', (event) => {
        if (event.target === overlay) {
            overlay.style.display = 'none';
        }
    });

    // Close with ESC key
    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            overlay.style.display = 'none';
        }
    });
</script>

</body>
</html>
